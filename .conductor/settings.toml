"$schema" = "https://conductor.build/schemas/settings.repo.schema.json"

[scripts]
setup = "pnpm install"
archive = "rm -rf node_modules .next"
run_mode = "concurrent"

[scripts.run.dev]
command = "pnpm dev"
default = true
icon = "play"

[scripts.run.build]
command = "pnpm build"
icon = "hammer"

[scripts.run.check]
command = "pnpm check"
icon = "test-tube"
